# ===============================
# Spring Boot Application
# ===============================
spring.application.name=logistics
server.port=8080

# ===============================
# PostgreSQL datasource
# ===============================
# Values are read from the environment. Local dev defaults point to the
# throwaway local database and can be overridden via env variables.
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/logistics_db}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:logistics_user}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:logistics123}
spring.datasource.driver-class-name=org.postgresql.Driver

# ===============================
# JPA / Hibernate
# ===============================
# Schema is owned by Flyway (see db/migration). Hibernate only validates that
# the entity model matches the migrated schema; it never modifies the schema.
spring.jpa.hibernate.ddl-auto=validate
# SQL logging is off by default: statements can leak data into logs.
# Re-enable locally with SPRING_JPA_SHOW_SQL=true when debugging.
spring.jpa.show-sql=${SPRING_JPA_SHOW_SQL:false}
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.open-in-view=false

# ===============================
# Flyway (database migrations)
# ===============================
spring.flyway.enabled=true
# Baseline existing (pre-Flyway) databases so V1 is not re-applied on top of
# a schema previously created by Hibernate ddl-auto. Fresh databases run V1.
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=1

# ===============================
# OpenAPI / Swagger UI
# ===============================

# Master switch: Swagger UI and the OpenAPI spec are a development tool.
# Enabled by default for local dev; production-like deployments (see
# docker-compose.yml) disable it via SPRINGDOC_ENABLED=false.
springdoc.api-docs.enabled=${SPRINGDOC_ENABLED:true}
springdoc.swagger-ui.enabled=${SPRINGDOC_ENABLED:true}

# Path for Swagger UI
springdoc.swagger-ui.path=/swagger-ui.html

# Path for OpenAPI JSON spec
springdoc.api-docs.path=/v3/api-docs

# Sort endpoints alphabetically by HTTP method
springdoc.swagger-ui.operationsSorter=method

# Sort tags (entity groups) alphabetically
springdoc.swagger-ui.tagsSorter=alpha

# Expand all endpoints by default (change to 'list' to collapse)
springdoc.swagger-ui.docExpansion=list

# Show request duration in Swagger UI
springdoc.swagger-ui.display-request-duration=true

# ===============================
# Actuator (observability)
# ===============================
# Only expose health and info over HTTP. Access is further restricted to
# ADMIN in SecurityConfig. Do not expose everything (env/beans/etc.).
management.endpoints.web.exposure.include=health,info

# ===============================
# Dashboard (UI) thresholds
# ===============================
mols.dashboard.low-stock-threshold=10
mols.dashboard.critical-stock-threshold=5
mols.dashboard.low-stock-list-limit=10

mols.dashboard.stale-order-days=3
mols.dashboard.stale-orders-list-limit=5

mols.dashboard.recent-activity-hours=24
mols.dashboard.movement-chart-days=30

# Percent value between 0 and 100
mols.dashboard.fulfillment-target-percent=90

# ===============================
# Email (Sprint 19)
# ===============================
# Master switch: emails (low-stock/stale-order digest, password-reset
# links) are only ever sent when this is explicitly true. spring.mail.host
# below always has a default so spring-boot-starter-mail's auto-configured
# JavaMailSender bean exists regardless (its creation is conditional on
# spring.mail.host being set) — without this the app would fail to start
# whenever no real SMTP server is configured, exactly the situation this
# flag exists to make safe.
mols.mail.enabled=${MOLS_MAIL_ENABLED:false}
mols.mail.from=${MOLS_MAIL_FROM:mols-noreply@example.com}
# Cron: second minute hour day-of-month month day-of-week. Default: 07:00 daily.
mols.mail.digest-cron=${MOLS_MAIL_DIGEST_CRON:0 0 7 * * *}
# Used to build the link inside the password-reset email. No trailing slash.
mols.mail.app-base-url=${MOLS_MAIL_APP_BASE_URL:http://localhost:8080}

spring.mail.host=${SPRING_MAIL_HOST:localhost}
spring.mail.port=${SPRING_MAIL_PORT:587}
spring.mail.username=${SPRING_MAIL_USERNAME:}
spring.mail.password=${SPRING_MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=${SPRING_MAIL_SMTP_AUTH:true}
spring.mail.properties.mail.smtp.starttls.enable=${SPRING_MAIL_SMTP_STARTTLS:true}

# ===============================
# Security / JWT
# ===============================
# Signing key for JWT (Base64/hex, min 256 bits for HS256). REQUIRED: there is
# no committed default. Provide it via the SECURITY_JWT_SECRET_KEY environment
# variable (see .env.example). Generate one with: openssl rand -hex 32
security.jwt.secret-key=${SECURITY_JWT_SECRET_KEY}

# Token expiration in milliseconds (default: 24 hours)
security.jwt.expiration-ms=${SECURITY_JWT_EXPIRATION_MS:86400000}

# Password-reset link lifetime in milliseconds (default: 30 minutes). Short
# on purpose — unlike the session token above, this one grants a password
# change, not just continued access.
security.jwt.reset-token-expiration-ms=${SECURITY_JWT_RESET_TOKEN_EXPIRATION_MS:1800000}

# Secure flag of the HttpOnly auth cookie set on /api/auth/login (browser
# clients). Default false so plain-HTTP local dev works; set
# SECURITY_JWT_COOKIE_SECURE=true whenever the app is served over HTTPS.
security.jwt.cookie-secure=${SECURITY_JWT_COOKIE_SECURE:false}

# ===============================
# Security / Login lockout (brute-force protection)
# ===============================
# Consecutive failed logins for the same username before a temporary lockout.
security.lockout.max-attempts=${SECURITY_LOCKOUT_MAX_ATTEMPTS:5}
# Lockout duration in milliseconds (default: 15 minutes).
security.lockout.lock-duration-ms=${SECURITY_LOCKOUT_DURATION_MS:900000}

# ===============================
# Security / Login Bootstrap (dev)
# ===============================

# Optional: creates an initial ADMIN user on startup (dev only).
# If you use the first-run setup page at /app/setup, keep this disabled.
security.bootstrap.admin.enabled=${BOOTSTRAP_ADMIN_ENABLED:false}
security.bootstrap.admin.username=${BOOTSTRAP_ADMIN_USERNAME:admin}
security.bootstrap.admin.password=${BOOTSTRAP_ADMIN_PASSWORD:admin}
