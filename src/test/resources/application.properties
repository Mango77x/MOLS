# ===============================
# Test configuration
#
# Self-contained config used when running the test suite. It supplies a
# throwaway JWT signing key so the application context can start without any
# real secret being committed. The datasource points at the local dev database
# by default and is overridden by SPRING_DATASOURCE_* env variables in CI.
# ===============================
spring.application.name=logistics-test

# Datasource: integration tests IGNORE these values — their datasource is
# wired automatically to a Testcontainers PostgreSQL via @ServiceConnection.
# Kept only as a local fallback for ad-hoc test setups.
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/logistics_db}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:logistics_user}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:logistics123}
spring.datasource.driver-class-name=org.postgresql.Driver

# Schema owned by Flyway; Hibernate validates only.
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.open-in-view=false

# Flyway
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=1

# Actuator
management.endpoints.web.exposure.include=health,info

# Dashboard thresholds
mols.dashboard.low-stock-threshold=10
mols.dashboard.critical-stock-threshold=5
mols.dashboard.low-stock-list-limit=10
mols.dashboard.stale-order-days=3
mols.dashboard.stale-orders-list-limit=5
mols.dashboard.recent-activity-hours=24
mols.dashboard.movement-chart-days=30
mols.dashboard.fulfillment-target-percent=90

# Throwaway signing key (valid Base64/hex) — TEST ONLY, never used in real environments.
security.jwt.secret-key=0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef
security.jwt.expiration-ms=86400000
security.jwt.reset-token-expiration-ms=1800000

# Bootstrap admin disabled in tests
security.bootstrap.admin.enabled=false

# Mail (Sprint 19): disabled in tests, same as the real default. spring.mail.host
# still needs a value — spring-boot-starter-mail's JavaMailSender bean is only
# auto-configured when it's set, and NotificationMailService requires that bean
# to exist (even though it never actually calls send() with mail disabled).
mols.mail.enabled=false
mols.mail.from=mols-noreply@example.com
mols.mail.digest-cron=0 0 7 * * *
mols.mail.app-base-url=http://localhost:8080
spring.mail.host=localhost
