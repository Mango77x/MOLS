# ================================================
# OWASP Dependency-Check (Software Composition Analysis)
#
# Scans all dependencies against the NVD for known CVEs. Runs weekly and
# on demand (not per-push: the NVD feed download is slow and rate-limited).
# The build fails on any CVE with CVSS >= 7 (High/Critical).
#
# Optional: add an NVD_API_KEY repository secret (free at
# https://nvd.nist.gov/developers/request-an-api-key) to speed up feed
# downloads dramatically. The scan works without it, just slower.
# ================================================

name: Dependency Security Scan

on:
  schedule:
    - cron: '0 6 * * 1'   # Mondays 06:00 UTC
  workflow_dispatch:

jobs:
  dependency-check:
    name: OWASP Dependency-Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Cache Maven packages
        uses: actions/cache@v6
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-m2

      # Cache the NVD database between runs so only deltas are downloaded
      - name: Cache Dependency-Check data
        uses: actions/cache@v6
        with:
          path: ~/.dependency-check-data
          key: ${{ runner.os }}-odc-${{ github.run_id }}
          restore-keys: ${{ runner.os }}-odc-

      - name: Run Dependency-Check
        env:
          NVD_API_KEY: ${{ secrets.NVD_API_KEY }}
        run: |
          chmod +x mvnw
          ARGS="-DfailBuildOnCVSS=7 -DdataDirectory=$HOME/.dependency-check-data"
          if [ -n "$NVD_API_KEY" ]; then
            ARGS="$ARGS -DnvdApiKey=$NVD_API_KEY"
          fi
          ./mvnw org.owasp:dependency-check-maven:12.1.3:check -B $ARGS

      - name: Upload Dependency-Check report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: dependency-check-report
          path: target/dependency-check-report.html
