# ================================================
# CodeQL static security analysis
#
# Scans the Java codebase for security vulnerabilities and coding errors
# on every push/PR to main, plus a weekly sweep so newly published CodeQL
# queries are applied to existing code. Findings appear under
# Security > Code scanning alerts.
# ================================================

name: CodeQL

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  schedule:
    - cron: '30 5 * * 1'   # Mondays 05:30 UTC

jobs:
  analyze:
    name: Analyze (Java)
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Cache Maven packages
        uses: actions/cache@v6
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-m2

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: java
          queries: security-and-quality

      # CodeQL needs a real build to observe; tests are not required here
      - name: Build
        run: |
          chmod +x mvnw
          ./mvnw compile -B -DskipTests

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@v4
