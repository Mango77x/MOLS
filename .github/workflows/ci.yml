# ================================================
# MOLS CI Pipeline
# Runs on every push and pull request to main
#
# The test suite includes Testcontainers-based integration tests, which
# start their own disposable PostgreSQL — no service container needed.
# `verify` also enforces the JaCoCo coverage floor and generates the
# CycloneDX SBOM, both published as build artifacts.
# ================================================

name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    name: Build and Test
    runs-on: ubuntu-latest

    steps:

      # Step 1: Download the code
      - name: Checkout code
        uses: actions/checkout@v4

      # Step 2: Install Java 21
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      # Step 3: Cache Maven dependencies
      # Avoids re-downloading dependencies on every run
      - name: Cache Maven packages
        uses: actions/cache@v4
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-m2

      # Step 4: Make mvnw executable (required on Linux)
      - name: Make mvnw executable
        run: chmod +x mvnw

      # Step 5: Full verification — compile, unit + integration tests
      # (Testcontainers), JaCoCo coverage gate, package, SBOM generation.
      - name: Build, test and verify
        run: ./mvnw verify -B

      # Step 6: Publish the SBOM (supply-chain transparency)
      - name: Upload SBOM
        uses: actions/upload-artifact@v4
        with:
          name: sbom
          path: target/classes/META-INF/sbom/application.cdx.json

      # Step 7: Publish the coverage report
      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-report
          path: target/site/jacoco/
